
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EAHGC 2026 – Réservation</title>

  <!-- EmailJS -->
  <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
  <script>
    (function(){
      emailjs.init("VOTRE_PUBLIC_KEY");
    })();
  </script>
</head>
<body style="font-family:Arial, sans-serif; padding:40px; max-width:600px; margin:auto">
  <h2>Test réservation – EAHGC 2026</h2>

  <form id="bookForm" onsubmit="submitForm(event)">
    <input placeholder="Nom" required><br><br>
    <input placeholder="Prénom" required><br><br>
    <input type="email" placeholder="Email" required><br><br>
    <input placeholder="Téléphone" required><br><br>
    <input placeholder="Offre" value="Table VIP"><br><br>
    <input placeholder="Jour" value="Week-end"><br><br>
    <input placeholder="Quantité" value="1"><br><br>
    <input placeholder="Total" value="20000 DH"><br><br>
    <textarea placeholder="Message"></textarea><br><br>
    <button type="submit">Confirmer</button>
  </form>

  <p id="ok" style="display:none; color:green; font-weight:bold">Demande envoyée ✅</p>

  <script>
  function submitForm(e){
    e.preventDefault();
    const inputs = document.querySelectorAll('input');
    const message = document.querySelector('textarea').value;

    emailjs.send(
      "service_emz7ec8",
      "template_vec9wzh",
      {
        nom: inputs[0].value,
        prenom: inputs[1].value,
        email: inputs[2].value,
        telephone: inputs[3].value,
        offre: inputs[4].value,
        jour: inputs[5].value,
        quantite: inputs[6].value,
        total: inputs[7].value,
        message: message
      }
    ).then(function(){
      document.getElementById('ok').style.display='block';
      document.getElementById('bookForm').style.display='none';
    }, function(error){
      alert('Erreur EmailJS');
      console.error(error);
    });
  }
  </script>
</body>
</html>
